name: Спутниковый мониторинг пожаров

on:
  push:
    branches: [main]
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  fetch-fires:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Устанавливаем библиотеки
        run: |
          pip install requests

      - name: Запускаем парсер NASA
        run: python nasa_fire_parser.py

      - name: Сохраняем изменения
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add fires_data.json
          git diff --staged --quiet || git commit -m "🛰️ Автообновление $(date '+%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
